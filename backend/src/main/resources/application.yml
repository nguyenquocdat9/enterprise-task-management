server:
  port: 8080

spring:
  application:
    name: enterprise-task-management

  datasource:
    url: jdbc:postgresql://localhost:5432/enterprise_task_management
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true